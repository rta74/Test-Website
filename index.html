<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan Thomas Personal Portfolio</title>

  <style>
    :root {
      --bg: #f4f2ea;
      --text: #252323;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 350vh;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      padding: 48px 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .logo {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0.08em;
      font-size: 1.1rem;
      transform: rotate(-7deg);
    }

    .menu {
      font-size: 1.45rem;
      font-weight: 700;
    }

    .hero {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .title-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      padding: 0 24px;
    }

    .title {
      font-size: clamp(3.2rem, 8.8vw, 9rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .title span {
      display: block;
      white-space: nowrap;
    }

    #trex {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: -18vh;
      width: min(760px, 58vw);
      transform: translateX(-5%);
      pointer-events: none;
    }

    .scroll-hint {
      position: fixed;
      left: 50%;
      bottom: 36px;
      z-index: 10;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.55;
      transition: opacity 0.25s ease;
    }

    .scroll-hint.hidden {
      opacity: 0;
    }

    @media (max-width: 800px) {
      .nav {
        padding: 32px 28px;
      }

      .menu {
        font-size: 1.15rem;
      }

      .title {
        font-size: clamp(2.7rem, 14vw, 6rem);
      }

      .title span {
        white-space: normal;
      }

      #trex {
        width: 105vw;
        left: 35%;
        bottom: -10vh;
      }
    }
  </style>
</head>

<body>
  <header class="nav">
    <div class="logo">RYAN</div>
    <div class="menu">Menu</div>
  </header>

  <main class="hero">
    <div class="title-wrap">
      <h1 class="title">
        <span>RYAN THOMAS</span>
        <span>PERSONAL PORTFOLIO</span>
      </h1>
    </div>

    <div id="trex"></div>
  </main>

  <div class="scroll-hint" id="scrollHint">Scroll</div>

  <!-- Lottie library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <script>
    const trexContainer = document.getElementById("trex");
    const scrollHint = document.getElementById("scrollHint");

    const trexAnimation = lottie.loadAnimation({
      container: trexContainer,
      renderer: "svg",
      loop: false,
      autoplay: false,
      path: "https://uploads-ssl.webflow.com/5ef89928a1cfcec5918d8d5d/5f0ab45b992a5eb630a33b01_t-rex-05.json"
    });

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateAnimation() {
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = clamp(window.scrollY / maxScroll, 0, 1);

      scrollHint.classList.toggle("hidden", progress > 0.03);

      if (trexAnimation.totalFrames) {
        const frame = progress * (trexAnimation.totalFrames - 1);
        trexAnimation.goToAndStop(frame, true);
      }

      /*
        This moves the whole dinosaur upward slightly as you scroll,
        while the Lottie file controls the actual eating animation.
      */
      const moveY = 22 - progress * 38;
      const moveX = -5 - progress * 10;
      const scale = 1 + progress * 0.12;

      trexContainer.style.transform = `
        translate(${moveX}%, ${moveY}%)
        scale(${scale})
      `;
    }

    trexAnimation.addEventListener("DOMLoaded", updateAnimation);
    window.addEventListener("scroll", updateAnimation);
    window.addEventListener("resize", updateAnimation);
  </script>
</body>
</html>
