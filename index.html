<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan Thomas Personal Portfolio</title>

  <style>
    :root {
      --bg: #f4f2ea;
      --ink: #242222;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 260vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 48px 64px;
      pointer-events: none;
    }

    .logo {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0.08em;
      font-size: 1.05rem;
      transform: rotate(-7deg);
    }

    .menu {
      font-size: 1.45rem;
      font-weight: 700;
    }

    .stage {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .title-wrap {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .title {
      font-weight: 900;
      font-size: clamp(3.4rem, 9vw, 9rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
    }

    .line {
      display: block;
      white-space: nowrap;
    }

    .portfolio-line {
      position: relative;
      display: inline-flex;
      justify-content: center;
    }

    .letter {
      display: inline-block;
      transform-origin: center;
      transition:
        opacity 0.22s ease,
        transform 0.42s cubic-bezier(.2,.8,.2,1);
      will-change: transform, opacity;
    }

    .letter.eaten {
      opacity: 0;
      transform:
        translate(
          calc(var(--x, 0) * 1px),
          calc(var(--y, 0) * 1px)
        )
        rotate(calc(var(--r, 0) * 1deg))
        scale(0.35);
    }

    .dino-wrap {
      position: absolute;
      z-index: 8;
      width: min(760px, 58vw);
      left: 52%;
      bottom: -72%;
      transform:
        translate3d(0, 0, 0)
        scale(1);
      transition: none;
      will-change: transform, bottom, left;
      pointer-events: none;
    }

    .dino {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .dino path,
    .dino circle,
    .dino ellipse,
    .dino line,
    .dino polyline {
      vector-effect: non-scaling-stroke;
    }

    .jaw {
      transform-box: fill-box;
      transform-origin: 38% 48%;
      transition: transform 0.08s linear;
    }

    .bite-mark {
      position: absolute;
      z-index: 7;
      left: 49%;
      top: 62%;
      width: 90px;
      height: 70px;
      opacity: 0;
      transform: translate(-50%, -50%) rotate(-16deg) scale(0.8);
      pointer-events: none;
    }

    .bite-mark.active {
      opacity: 1;
    }

    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #bf3434;
    }

    .dot:nth-child(1) { left: 5px; top: 31px; }
    .dot:nth-child(2) { left: 18px; top: 19px; width: 4px; height: 4px; }
    .dot:nth-child(3) { left: 28px; top: 44px; width: 9px; height: 9px; }
    .dot:nth-child(4) { left: 43px; top: 29px; width: 5px; height: 5px; }
    .dot:nth-child(5) { left: 58px; top: 41px; width: 7px; height: 7px; }
    .dot:nth-child(6) { left: 72px; top: 24px; width: 4px; height: 4px; }

    .scroll-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      z-index: 15;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.55;
      transition: opacity 0.25s ease;
    }

    .scroll-hint.hidden {
      opacity: 0;
    }

    @media (max-width: 800px) {
      .top-bar {
        padding: 32px 28px;
      }

      .menu {
        font-size: 1.15rem;
      }

      .title {
        font-size: clamp(3rem, 15vw, 6rem);
      }

      .line {
        white-space: normal;
      }

      .dino-wrap {
        width: 92vw;
        left: 28%;
      }
    }
  </style>
</head>

<body>

  </header>

  </main>

  <div class="scroll-hint" id="scrollHint">Scroll</div>

  <script>
    const dino = document.getElementById("dinoWrap");
    const jaw = document.getElementById("jaw");
    const letters = [...document.querySelectorAll(".letter")];
    const biteMark = document.getElementById("biteMark");
    const scrollHint = document.getElementById("scrollHint");

    letters.forEach((letter, index) => {
      letter.style.setProperty("--x", [-120, -85, -40, 25, 70, 115, 60, -70, 130][index]);
      letter.style.setProperty("--y", [-35, 70, -90, 105, -50, 95, 140, -120, 25][index]);
      letter.style.setProperty("--r", [-28, 44, -65, 32, -38, 72, 95, -80, 45][index]);
    });

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateScene() {
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const progress = clamp(window.scrollY / maxScroll, 0, 1);

      scrollHint.classList.toggle("hidden", progress > 0.04);

      /*
        Dinosaur movement:
        - starts low/right
        - rises into the word
        - moves left slightly while chewing
      */
      const rise = progress * 100;
      const x = 38 - progress * 48;
      const y = 72 - rise * 1.18;
      const scale = 0.86 + progress * 0.24;

      dino.style.transform = `
        translate3d(${x}vw, ${y}vh, 0)
        scale(${scale})
      `;

      /*
        Jaw movement:
        Opens around the eating zone, then closes.
      */
      const chewZone = progress > 0.32 && progress < 0.78;
      const jawOpen = chewZone ? Math.sin(progress * 58) * 9 + 12 : 0;
      jaw.style.transform = `rotate(${jawOpen}deg)`;

      /*
        Bite mark follows mouth area.
      */
      if (progress > 0.38 && progress < 0.76) {
        biteMark.classList.add("active");
        biteMark.style.left = `${54 - progress * 15}%`;
        biteMark.style.top = `${63 - progress * 3}%`;
      } else {
        biteMark.classList.remove("active");
      }

      /*
        Eat the PORTFOLIO letters one by one.
      */
      const eatStart = 0.38;
      const eatEnd = 0.82;
      const eatProgress = clamp((progress - eatStart) / (eatEnd - eatStart), 0, 1);
      const eatenCount = Math.floor(eatProgress * (letters.length + 1));

      letters.forEach((letter, index) => {
        if (index < eatenCount) {
          letter.classList.add("eaten");
        } else {
          letter.classList.remove("eaten");
        }
      });
    }

    window.addEventListener("scroll", updateScene);
    window.addEventListener("resize", updateScene);
    window.addEventListener("load", updateScene);
  </script>
</body>
</html>
